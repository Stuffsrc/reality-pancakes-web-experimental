<!DOCTYPE html>
<html>
<head>
    <title>Reality Pancakes</title>
    <!-- Link to PyScript assets -->
    <link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
    <script defer src="https://pyscript.net/latest/pyscript.js"></script>
</head>
<body>
    <h1>Python Output:</h1>
    <!-- This tag runs your Python code -->
    <py-script src="main.py"></py-script>
    <py-config>
        packages = ["pygame-ce"]        
        [[fetch]]
        from = "asset/fonts/"
        files = ["schrift.ttf"]
        to_folder = "asset/fonts"        
    </py-config>

<canvas id="canvas"></canvas>
    <script type="py-game" src="main.py"></script>
</body>
</html>
