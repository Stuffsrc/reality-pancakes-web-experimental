<!DOCTYPE html>
<html>
<head>
    <title>Reality Pancakes</title>
    <link rel="stylesheet" href="https://pyscript.net" />
    <script type="module" src="https://pyscript.net"></script>

    <py-config>
        packages = ["pygame-ce"]
        
        [files]
        # This maps the real file to the virtual location Python sees
        "asset/fonts/schrift.ttf" = "assets/fonts/schrift.ttf"
    </py-config>
</head>
<body>
    <h1>Reality Pancakes</h1>
    <canvas id="canvas"></canvas>
    
    <!-- Use relative path: no leading slash -->
    <script type="py-game" src="main.py"></script>
</body>
</html>
